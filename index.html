<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E部 2026年5月 FBA库存报告</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: #f5f7fb;
      color: #172033;
    }
    .page {
      max-width: 980px;
      margin: 72px auto;
      padding: 0 24px;
    }
    .hero {
      background: linear-gradient(135deg, #111827, #1d4ed8 58%, #14b8a6);
      color: white;
      border-radius: 24px;
      padding: 42px;
      box-shadow: 0 24px 60px rgba(30,64,175,.22);
    }
    .tag {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.12);
      font-size: 13px;
    }
    h1 {
      margin: 16px 0 12px;
      font-size: 34px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      line-height: 1.8;
      opacity: .9;
    }
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 22px;
    }
    a {
      display: block;
      background: white;
      color: #172033;
      text-decoration: none;
      border-radius: 18px;
      padding: 26px;
      border: 1px solid #dde5f0;
      box-shadow: 0 10px 26px rgba(15,23,42,.06);
      transition: transform .18s ease, box-shadow .18s ease;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(15,23,42,.10);
    }
    a strong {
      display: block;
      font-size: 21px;
      margin-bottom: 9px;
    }
    a span {
      color: #64748b;
      line-height: 1.7;
    }
    .foot {
      margin-top: 22px;
      color: #64748b;
      font-size: 13px;
      text-align: center;
    }
    @media (max-width: 760px) {
      .page { margin: 34px auto; }
      .hero { padding: 30px; }
      .cards { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <span class="tag">FBA Inventory Reports</span>
      <h1>E部 2026年5月 FBA库存报告</h1>
      <p>一个入口查看两个报告：库存可视化分析与库存处理计划。</p>
    </section>

    <section class="cards">
      <a href="analysis.html">
        <strong>库存可视化分析报告</strong>
        <span>查看库存金额、库龄结构、小组排行、负责人风险、站点分布和重点 ASIN。</span>
      </a>

      <a href="action-plan.html">
        <strong>库存处理计划报告</strong>
        <span>查看分库龄处理目标、四周执行节奏、小组目标、负责人目标和重点 SKU 清单。</span>
      </a>
    </section>

    <div class="foot">建议使用 Chrome 或 Edge 打开；手机和电脑均可查看。</div>
  </main>
</body>
</html>
